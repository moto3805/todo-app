<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToDoリスト</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>📝 ToDoリスト</h1>

        <div class="input-section">
            <input type="text" id="todoInput" placeholder="タスク名を入力..." required>

            <div class="form-row">
                <div class="form-group">
                    <label>カテゴリー/タグ</label>
                    <input type="text" id="categoryInput" placeholder="仕事, 個人, etc...">
                </div>

                <div class="form-group">
                    <label>優先度</label>
                    <select id="prioritySelect">
                        <option value="low">低</option>
                        <option value="medium" selected>中</option>
                        <option value="high">高</option>
                    </select>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>開始日</label>
                    <input type="date" id="startDate">
                </div>

                <div class="form-group">
                    <label>終了日</label>
                    <input type="date" id="endDate">
                </div>
            </div>

            <button id="addBtn">追加</button>
        </div>

        <div class="control-section">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="🔍 タスクを検索...">
            </div>

            <div class="filter-sort-row">
                <div class="filter-box">
                    <label>フィルター:</label>
                    <select id="filterSelect">
                        <option value="all">すべて</option>
                        <option value="active">未完了</option>
                        <option value="completed">完了済み</option>
                    </select>
                </div>

                <div class="sort-box">
                    <label>並び替え:</label>
                    <select id="sortSelect">
                        <option value="default">追加順</option>
                        <option value="priority">優先度順</option>
                        <option value="startDate">開始日順</option>
                        <option value="endDate">終了日順</option>
                        <option value="progress">進捗順</option>
                    </select>
                </div>
            </div>
        </div>

        <div id="categoryTags" class="category-tags"></div>

        <ul id="todoList"></ul>
    </div>

    <script src="app.js"></script>
</body>
</html>
